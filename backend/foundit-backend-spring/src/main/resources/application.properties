# Server Configuration
server.port=${PORT:5432}

# Database Configuration (CORRECT for Spring Boot)
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# JWT Configuration
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
file.upload-dir=./uploads

# Email Configuration (optional)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SPRING_MAIL_USERNAME}
spring.mail.password=${SPRING_MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# CORS Configuration
cors.allowed-origins=${FRONTEND_URL:http://localhost:3000}

# Python AI Service
python.service.url=${PYTHON_SERVICE_URL:http://localhost:5000}
python.service.enabled=${PYTHON_SERVICE_ENABLED:false}

# Matching Algorithm
matching.threshold=0.65
matching.image-weight=0.35
matching.object-type-weight=0.25
matching.color-weight=0.20
matching.description-weight=0.20
