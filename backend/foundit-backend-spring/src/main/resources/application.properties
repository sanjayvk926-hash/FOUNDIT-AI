# Server Configuration
server.port=8080
server.servlet.context-path=/api

# Application Name
spring.application.name=FoundIt AI Backend

# Database Configuration (MySQL)
spring.datasource.url=jdbc:mysql://localhost:3306/foundit_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=foundit_user
spring.datasource.password=foundit_password

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# JWT Configuration
jwt.secret=FoundItAI-SecretKey-2024-Campus-LostAndFound-System-SuperSecure
jwt.expiration=86400000

# File Upload Configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
file.upload-dir=./uploads

# Email Configuration (Gmail)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Logging Configuration
logging.level.org.springframework.security=INFO
logging.level.com.foundit=DEBUG
logging.level.org.hibernate.SQL=DEBUG

# CORS Configuration
cors.allowed-origins=http://localhost:3000,http://localhost:5173,https://sanjayvk926-hash.github.io

# Python Service Configuration (for YOLO/OpenCV)
python.service.url=http://localhost:5000
python.service.enabled=true

# AI Matching Configuration
matching.threshold=0.65
matching.image-weight=0.35
matching.object-type-weight=0.25
matching.color-weight=0.20
matching.description-weight=0.20

# QR Code Configuration
qr.code.size=300
qr.code.format=PNG
