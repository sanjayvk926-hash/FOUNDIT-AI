# Server Configuration
server.port=${PORT:8080}

# ================= DATABASE =================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/test}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

# Required for Render PostgreSQL (IMPORTANT)
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.connection-timeout=30000

# ================= JPA =================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# REMOVE dialect warning issue
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ================= JWT =================
jwt.secret=${JWT_SECRET:default-secret-key}
jwt.expiration=86400000

# ================= FILE UPLOAD =================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
file.upload-dir=./uploads

# ================= EMAIL =================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ================= CORS =================
cors.allowed-origins=${FRONTEND_URL:http://localhost:3000}

# ================= PYTHON SERVICE =================
python.service.url=${PYTHON_SERVICE_URL:http://localhost:5000}
python.service.enabled=${PYTHON_SERVICE_ENABLED:false}

# ================= MATCHING =================
matching.threshold=0.65
matching.image-weight=0.35
matching.object-type-weight=0.25
matching.color-weight=0.20
matching.description-weight=0.20

# ================= LOGGING =================
logging.level.org.springframework=INFO
