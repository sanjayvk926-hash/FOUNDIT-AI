version: '3.8'

services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: foundit-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: foundit_db
      MYSQL_ROOT_PASSWORD: foundit_password
      MYSQL_USER: foundit_user
      MYSQL_PASSWORD: foundit_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - foundit-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Spring Boot Backend
  backend:
    build: .
    container_name: foundit-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/foundit_db?createDatabaseIfNotExist=true
      SPRING_DATASOURCE_USERNAME: foundit_user
      SPRING_DATASOURCE_PASSWORD: foundit_password
      JWT_SECRET: your-production-secret-key-change-this
      SPRING_MAIL_USERNAME: your-email@gmail.com
      SPRING_MAIL_PASSWORD: your-app-password
    ports:
      - "8080:8080"
    volumes:
      - ./uploads:/app/uploads
    networks:
      - foundit-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/auth/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Python AI Service (Optional)
  ai-service:
    build:
      context: .
      dockerfile: Dockerfile.ai
    container_name: foundit-ai-service
    restart: unless-stopped
    ports:
      - "5000:5000"
    networks:
      - foundit-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  foundit-network:
    driver: bridge

volumes:
  mysql_data:
    driver: local
